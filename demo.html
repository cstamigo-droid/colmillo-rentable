<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111a15" />
  <title>Colmillo Rentable — aprende a invertir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@500;600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/mascots/colmillo.png" />
</head>
<body>
  <!-- Barra superior: racha · XP -->
  <header id="topbar" class="topbar hidden">
    <div class="stat" title="Racha"><i id="ic-flame" class="stat-ic"></i><span id="stat-racha">0</span></div>
    <div class="stat" title="XP"><i id="ic-zap" class="stat-ic"></i><span id="stat-xp">0</span></div>
  </header>

  <!-- Contenedor de vistas (lo llena el router) -->
  <main id="app"></main>

  <!-- Navegación inferior -->
  <nav id="tabbar" class="tabbar hidden">
    <button data-route="#/mapa"   class="tab"><i id="ic-map" class="tab-ic"></i><span>Aprender</span></button>
    <button data-route="#/perfil" class="tab"><i id="ic-paw" class="tab-ic"></i><span>Perfil</span></button>
    <button data-route="#/panel"  class="tab"><i id="ic-activity" class="tab-ic"></i><span>Panel</span></button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
